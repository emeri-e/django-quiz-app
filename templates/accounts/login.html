{% extends "base.html" %}

{% block title %}Login — Quiz App{% endblock %}

{% block content %}
<div style="max-width: 440px; margin: 2rem auto;">
    <div class="card">
        <div class="card-header" style="text-align: center;">
            <h2>Welcome Back</h2>
            <p class="text-muted" style="margin-top: 0.25rem; font-size: 0.9rem;">Sign in to continue</p>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}

                {% if form.errors %}
                    <div class="alert alert-danger">
                        Invalid username or password. Please try again.
                    </div>
                {% endif %}

                <div class="form-group">
                    <label for="id_username">Username</label>
                    <input type="text" name="username" id="id_username" class="form-control"
                           placeholder="Enter your username" autofocus required>
                </div>

                <div class="form-group">
                    <label for="id_password">Password</label>
                    <input type="password" name="password" id="id_password" class="form-control"
                           placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
            </form>
        </div>
        <div class="card-footer" style="text-align: center;">
            <p>Don't have an account? <a href="{% url 'accounts:register' %}">Create one</a></p>
        </div>
    </div>
</div>
{% endblock %}
